<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Motorcycle Store</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="./images/Motorcycle logo.png" />
  </head>

  <body class="bg-slate-950 text-white ">
    <nav class="bg-black shadow-lg sticky top-0 z-50">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 p-5">        <div class="logo">
        <img src="./images/Motorcycle logo.png" alt="logo" />
       
      </div>
        <input
  id="search"
  type="text"
  placeholder="Search motorcycle..."
  class="hidden sm:block w-full sm:w-[40%] px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-red-500"
/>
      </div>
    </nav>

    <section class="text-center py-16 px-5">
      <h1 class="text-5xl font-extrabold mb-5">
        Premium Motorcycle Collection
      </h1>

      <p class="text-slate-400 text-lg max-w-2xl mx-auto">
        Explore the best sport bikes, cruisers, dirt bikes and adventure
        motorcycles.
      </p>
    </section>

    <section
      id="products"
      class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 px-5 pb-20"
    ></section>

    <script src="fetch.js"></script>
  </body>
</html>
